<section class="ticket-page">

  <div class="ticket-box">

    <h2>🎟️ Book Your Ticket</h2>
    <p>Fill in your details to generate your ticket</p>

    <form id="ticketForm" class="ticket-form">

      <input type="text" id="name" placeholder="Full Name" required>

      <input type="email" id="email" placeholder="Email Address" required>

      <select id="type" required>
        <option value="">Select Ticket Type</option>
        <option value="Standard Pass">Standard Pass</option>
        <option value="Premium Experience">Premium Experience</option>
        <option value="VIP Package">VIP Package</option>
      </select>

     <button class="download-btn" onclick="downloadPDF()">
  Download Ticket
</button>

    </form>

    <div id="ticketResult"></div>

  </div>

</section>

<footer>

</footer>
